<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Crear Partido - La Liga</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            text-align: center;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
        }

        .admin-badge {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            display: inline-block;
            margin-left: 10px;
        }

        .form-section {
            background: #f8f9fa;
            padding: 25px;
            border-radius: 15px;
            margin-bottom: 30px;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        select, input {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        select:focus, input:focus {
            outline: none;
            border-color: #667eea;
        }

        .teams-container {
            display: grid;
            grid-template-columns: 1fr 50px 1fr;
            gap: 20px;
            margin-top: 30px;
        }

        .team-section {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            padding: 20px;
        }

        .team-section h3 {
            color: #667eea;
            margin-bottom: 15px;
            font-size: 18px;
        }

        .vs-divider {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }

        .team-logo {
            width: 80px;
            height: 80px;
            object-fit: contain;
            margin: 0 auto 15px;
            display: block;
        }

        .team-name {
            text-align: center;
            font-size: 16px;
            font-weight: bold;
            color: #333;
            margin-bottom: 20px;
        }

        .players-list {
            max-height: 400px;
            overflow-y: auto;
            padding-right: 10px;
        }

        .player-item {
            background: #f8f9fa;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .player-number {
            background: #667eea;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
        }

        .player-info {
            flex: 1;
        }

        .player-name {
            font-weight: 600;
            color: #333;
        }

        .player-position {
            font-size: 12px;
            color: #666;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #666;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #6c757d;
            color: white;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background: #5a6268;
        }

        .alert {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .alert-warning {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .no-players {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #f1f1f1;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb {
            background: #667eea;
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #5568d3;
        }

        /* Estilo para el selector de liga */
        #selectorLiga {
            font-size: 16px;
            font-weight: 600;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }

        #selectorLiga option {
            padding: 10px;
            font-size: 15px;
        }

        /* Selectores deshabilitados */
        select:disabled {
            background-color: #f0f0f0;
            color: #999;
            cursor: not-allowed;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>⚽ Crear Partido <span class="admin-badge">ADMIN</span></h1>
        <p class="subtitle">Selecciona la liga, dos equipos y configura el partido</p>

        <div id="alertContainer"></div>

        <div class="form-section">
            <h2>⚽ Información del Partido</h2>

            <!-- Selector de Liga -->
            <div class="form-group">
                <label for="selectorLiga">🌍 Selecciona la Liga</label>
                <select id="selectorLiga" onchange="cargarEquiposPorLiga()" required>
                    <option value="">Selecciona una liga...</option>
                    <option value="140" data-pais="España">🇪🇸 La Liga (España)</option>
                    <option value="39" data-pais="Inglaterra">🏴󠁧󠁢󠁥󠁮󠁧󠁿 Premier League (Inglaterra)</option>
                    <option value="135" data-pais="Italia">🇮🇹 Serie A (Italia)</option>
                    <option value="78" data-pais="Alemania">🇩🇪 Bundesliga (Alemania)</option>
                    <option value="61" data-pais="Francia">🇫🇷 Ligue 1 (Francia)</option>
                </select>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="equipoLocal">🏠 Equipo Local</label>
                    <select id="equipoLocal" onchange="loadTeamPlayers('local')" disabled>
                        <option value="">Primero selecciona una liga...</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="equipoVisitante">✈️ Equipo Visitante</label>
                    <select id="equipoVisitante" onchange="loadTeamPlayers('visitante')" disabled>
                        <option value="">Primero selecciona una liga...</option>
                    </select>
                </div>
            </div>

            <div class="form-group">
                <label for="fechaPartido">📅 Fecha y Hora del Partido</label>
                <input type="datetime-local" id="fechaPartido" required>
            </div>
        </div>

        <div class="teams-container" id="teamsContainer" style="display: none;">
            <div class="team-section" id="localTeamSection">
                <div id="localTeamHeader"></div>
                <div id="localPlayers"></div>
            </div>

            <div class="vs-divider">VS</div>

            <div class="team-section" id="visitanteTeamSection">
                <div id="visitanteTeamHeader"></div>
                <div id="visitantePlayers"></div>
            </div>
        </div>

        <button class="btn btn-primary" onclick="crearPartido()">🏆 Crear Partido</button>
        <button class="btn btn-secondary" onclick="volverInicio()">← Volver al Inicio</button>
    </div>

    <script>
        const API_URL = 'http://localhost:8081/api';
        let equiposLiga = [];  // Cambio: equiposLaLiga → equiposLiga
        let equipoLocalData = null;
        let equipoVisitanteData = null;
        let ligaSeleccionada = null;  // NUEVO: Guardar liga seleccionada

        // Verificar autenticación y rol de administrador
        function verificarAuth() {
            const token = localStorage.getItem('token');
            const userEmail = localStorage.getItem('userEmail');

            if (!token || !userEmail) {
                showAlert('Debes iniciar sesión para acceder a esta página', 'error');
                setTimeout(() => window.location.href = 'login.html', 2000);
                return false;
            }

            // Verificar si es admin (esto debería validarse en el backend)
            // Por ahora asumimos que si está logueado puede acceder
            return true;
        }

        /**
         * Cargar equipos de la liga seleccionada
         */
        async function cargarEquiposPorLiga() {
            if (!verificarAuth()) return;

            const selectorLiga = document.getElementById('selectorLiga');
            const ligaId = selectorLiga.value;

            // Si no hay liga seleccionada, deshabilitar equipos
            if (!ligaId) {
                deshabilitarSelectoresEquipos();
                return;
            }

            ligaSeleccionada = ligaId;
            const paisNombre = selectorLiga.options[selectorLiga.selectedIndex].getAttribute('data-pais');

            try {
                showAlert(`Cargando equipos de ${paisNombre}...`, 'warning');

                const response = await fetch(`${API_URL}/partidos/equipos-liga/${ligaId}?season=2024`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });

                // Detectar si el token ha expirado
                if (response.status === 401 || response.status === 403) {
                    showAlert('⚠️ Tu sesión ha expirado. Redirigiendo al login...', 'error');
                    localStorage.removeItem('token');
                    localStorage.removeItem('userEmail');
                    localStorage.removeItem('userRole');
                    setTimeout(() => window.location.href = 'login.html', 2000);
                    return;
                }

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || 'Error al cargar equipos');
                }

                equiposLiga = await response.json();

                // Llenar los selectores de equipos
                llenarSelectoresEquipos();

                // Habilitar selectores
                habilitarSelectoresEquipos();

                hideAlert();
                showAlert(`✓ ${equiposLiga.length} equipos cargados de ${paisNombre}`, 'success');
                setTimeout(hideAlert, 3000);

            } catch (error) {
                console.error('Error:', error);
                showAlert('Error: ' + error.message, 'error');
                deshabilitarSelectoresEquipos();
            }
        }

        /**
         * Llenar los selectores de equipos con los equipos cargados
         */
        function llenarSelectoresEquipos() {
            const selectLocal = document.getElementById('equipoLocal');
            const selectVisitante = document.getElementById('equipoVisitante');

            // Limpiar selectores
            selectLocal.innerHTML = '<option value="">Selecciona un equipo...</option>';
            selectVisitante.innerHTML = '<option value="">Selecciona un equipo...</option>';

            // Limpiar visualización de jugadores
            document.getElementById('teamsContainer').style.display = 'none';
            equipoLocalData = null;
            equipoVisitanteData = null;

            // Llenar con equipos
            equiposLiga.forEach(teamData => {
                const team = teamData.team;

                const optionLocal = document.createElement('option');
                optionLocal.value = team.id;
                optionLocal.textContent = team.name;
                optionLocal.setAttribute('data-nombre', team.name);

                const optionVisitante = document.createElement('option');
                optionVisitante.value = team.id;
                optionVisitante.textContent = team.name;
                optionVisitante.setAttribute('data-nombre', team.name);

                selectLocal.add(optionLocal);
                selectVisitante.add(optionVisitante);
            });
        }

        /**
         * Habilitar selectores de equipos
         */
        function habilitarSelectoresEquipos() {
            document.getElementById('equipoLocal').disabled = false;
            document.getElementById('equipoVisitante').disabled = false;
        }

        /**
         * Deshabilitar selectores de equipos
         */
        function deshabilitarSelectoresEquipos() {
            const selectLocal = document.getElementById('equipoLocal');
            const selectVisitante = document.getElementById('equipoVisitante');

            selectLocal.disabled = true;
            selectVisitante.disabled = true;
            selectLocal.innerHTML = '<option value="">Primero selecciona una liga...</option>';
            selectVisitante.innerHTML = '<option value="">Primero selecciona una liga...</option>';

            // Limpiar visualización
            document.getElementById('teamsContainer').style.display = 'none';
            equipoLocalData = null;
            equipoVisitanteData = null;
        }

        // Cargar jugadores de un equipo
        async function loadTeamPlayers(tipo) {
            const selectId = tipo === 'local' ? 'equipoLocal' : 'equipoVisitante';
            const teamId = document.getElementById(selectId).value;

            if (!teamId) {
                if (tipo === 'local') {
                    document.getElementById('localTeamHeader').innerHTML = '';
                    document.getElementById('localPlayers').innerHTML = '';
                } else {
                    document.getElementById('visitanteTeamHeader').innerHTML = '';
                    document.getElementById('visitantePlayers').innerHTML = '';
                }
                checkBothTeamsSelected();
                return;
            }

            const headerId = tipo === 'local' ? 'localTeamHeader' : 'visitanteTeamHeader';
            const playersId = tipo === 'local' ? 'localPlayers' : 'visitantePlayers';

            document.getElementById(playersId).innerHTML = '<div class="loading"><div class="spinner"></div>Cargando jugadores...</div>';

            try {
                // Buscar datos del equipo
                const teamData = equiposLiga.find(t => t.team.id == teamId);

                // Mostrar logo y nombre
                document.getElementById(headerId).innerHTML = `
                    <img src="${teamData.team.logo}" alt="${teamData.team.name}" class="team-logo">
                    <div class="team-name">${teamData.team.name}</div>
                `;

                // Cargar jugadores
                const response = await fetch(`${API_URL}/equipos/api-football/team/${teamId}/players?season=2024`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    }
                });

                if (!response.ok) {
                    throw new Error('Error al cargar jugadores');
                }

                const players = await response.json();

                if (tipo === 'local') {
                    equipoLocalData = { team: teamData.team, players };
                } else {
                    equipoVisitanteData = { team: teamData.team, players };
                }

                displayPlayers(players, playersId);
                checkBothTeamsSelected();
            } catch (error) {
                console.error('Error:', error);
                document.getElementById(playersId).innerHTML =
                    '<div class="no-players">❌ Error al cargar jugadores</div>';
            }
        }

        // Mostrar jugadores
        function displayPlayers(players, containerId) {
            const container = document.getElementById(containerId);

            if (!players || players.length === 0) {
                container.innerHTML = '<div class="no-players">No hay jugadores disponibles</div>';
                return;
            }

            // Agrupar por posición
            const positions = {
                'Goalkeeper': [],
                'Defender': [],
                'Midfielder': [],
                'Attacker': []
            };

            players.forEach(playerData => {
                if (playerData.statistics && playerData.statistics.length > 0) {
                    const stats = playerData.statistics[0];
                    const position = stats.games.position || 'Unknown';
                    const number = stats.games.number || '?';

                    const playerInfo = {
                        name: playerData.player.name,
                        position: position,
                        number: number
                    };

                    if (positions[position]) {
                        positions[position].push(playerInfo);
                    }
                }
            });

            let html = '<div class="players-list">';

            const positionLabels = {
                'Goalkeeper': '🧤 Porteros',
                'Defender': '🛡️ Defensas',
                'Midfielder': '⚙️ Centrocampistas',
                'Attacker': '⚡ Delanteros'
            };

            for (const [position, playerList] of Object.entries(positions)) {
                if (playerList.length > 0) {
                    html += `<h4 style="margin: 15px 0 10px 0; color: #667eea;">${positionLabels[position]}</h4>`;
                    playerList.forEach(player => {
                        html += `
                            <div class="player-item">
                                <div class="player-number">${player.number}</div>
                                <div class="player-info">
                                    <div class="player-name">${player.name}</div>
                                    <div class="player-position">${player.position}</div>
                                </div>
                            </div>
                        `;
                    });
                }
            }

            html += '</div>';
            container.innerHTML = html;
        }

        // Verificar si ambos equipos están seleccionados
        function checkBothTeamsSelected() {
            const teamsContainer = document.getElementById('teamsContainer');
            const equipoLocal = document.getElementById('equipoLocal').value;
            const equipoVisitante = document.getElementById('equipoVisitante').value;

            if (equipoLocal && equipoVisitante) {
                teamsContainer.style.display = 'grid';
            } else {
                teamsContainer.style.display = 'none';
            }
        }

        // Crear partido
        async function crearPartido() {
            const userRole = localStorage.getItem('userRole');

            // Verificar que sea ADMIN
            if (userRole !== 'ADMIN') {
                showAlert('❌ Solo usuarios con rol ADMIN pueden crear partidos. Contacta con un administrador.', 'error');
                return;
            }

            const equipoLocalId = document.getElementById('equipoLocal').value;
            const equipoVisitanteId = document.getElementById('equipoVisitante').value;
            const fecha = document.getElementById('fechaPartido').value;

            // Validaciones
            if (!equipoLocalId || !equipoVisitanteId) {
                showAlert('Debes seleccionar ambos equipos', 'error');
                return;
            }

            if (equipoLocalId === equipoVisitanteId) {
                showAlert('No puedes seleccionar el mismo equipo para local y visitante', 'error');
                return;
            }

            if (!fecha) {
                showAlert('Debes seleccionar una fecha para el partido', 'error');
                return;
            }

            // Obtener nombres de los equipos
            const selectLocal = document.getElementById('equipoLocal');
            const selectVisitante = document.getElementById('equipoVisitante');

            const equipoLocalOption = selectLocal.options[selectLocal.selectedIndex];
            const equipoVisitanteOption = selectVisitante.options[selectVisitante.selectedIndex];

            // Obtener nombre del atributo data o del texto
            const equipoLocalNombre = equipoLocalOption.getAttribute('data-nombre') || equipoLocalOption.text;
            const equipoVisitanteNombre = equipoVisitanteOption.getAttribute('data-nombre') || equipoVisitanteOption.text;

            // Validar que los nombres no estén vacíos
            if (!equipoLocalNombre || equipoLocalNombre.trim() === '') {
                showAlert('❌ Error: No se pudo obtener el nombre del equipo local', 'error');
                console.error('Error: nombre del equipo local vacío', equipoLocalOption);
                return;
            }

            if (!equipoVisitanteNombre || equipoVisitanteNombre.trim() === '') {
                showAlert('❌ Error: No se pudo obtener el nombre del equipo visitante', 'error');
                console.error('Error: nombre del equipo visitante vacío', equipoVisitanteOption);
                return;
            }

            // Log para depuración
            console.log('Creando partido:', {
                equipoLocalId: equipoLocalId,
                equipoLocalNombre: equipoLocalNombre,
                equipoVisitanteId: equipoVisitanteId,
                equipoVisitanteNombre: equipoVisitanteNombre,
                fecha: fecha
            });

            try {
                showAlert('Creando partido...', 'warning');

                const requestBody = {
                    equipoLocalId: parseInt(equipoLocalId),
                    equipoLocalNombre: equipoLocalNombre,
                    equipoVisitanteId: parseInt(equipoVisitanteId),
                    equipoVisitanteNombre: equipoVisitanteNombre,
                    fecha: fecha
                };

                console.log('Request body:', JSON.stringify(requestBody, null, 2));

                const response = await fetch(`${API_URL}/partidos/crear`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('token')}`
                    },
                    body: JSON.stringify(requestBody)
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Error al crear partido');
                }

                const partido = await response.json();

                showAlert('✓ ¡Partido creado exitosamente!', 'success');

                setTimeout(() => {
                    if (confirm('¿Deseas crear otro partido?')) {
                        location.reload();
                    } else {
                        window.location.href = 'index.html';
                    }
                }, 2000);
            } catch (error) {
                console.error('Error:', error);
                showAlert('Error: ' + error.message, 'error');
            }
        }

        // Mostrar alertas
        function showAlert(message, type) {
            const alertContainer = document.getElementById('alertContainer');
            alertContainer.innerHTML = `
                <div class="alert alert-${type}" style="display: block;">
                    ${message}
                </div>
            `;
        }

        function hideAlert() {
            document.getElementById('alertContainer').innerHTML = '';
        }

        // Volver al inicio
        function volverInicio() {
            window.location.href = 'index.html';
        }

        // Inicializar - Solo verificar autenticación al iniciar
        window.onload = function() {
            verificarAuth();
        };
    </script>
</body>
</html>
