<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro - Proyecto ACD</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .register-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 450px;
            width: 100%;
            padding: 40px;
        }

        .logo {
            text-align: center;
            margin-bottom: 30px;
        }

        .logo h1 {
            color: #667eea;
            font-size: 32px;
            margin-bottom: 10px;
        }

        .logo p {
            color: #666;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
            font-size: 14px;
        }

        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input.error {
            border-color: #dc3545;
        }

        .password-strength {
            margin-top: 5px;
            font-size: 12px;
        }

        .strength-bar {
            height: 4px;
            background: #e0e0e0;
            border-radius: 2px;
            margin-top: 5px;
            overflow: hidden;
        }

        .strength-fill {
            height: 100%;
            transition: all 0.3s;
            border-radius: 2px;
        }

        .strength-weak { width: 33%; background: #dc3545; }
        .strength-medium { width: 66%; background: #ffc107; }
        .strength-strong { width: 100%; background: #28a745; }

        .help-text {
            font-size: 12px;
            color: #666;
            margin-top: 5px;
        }

        .btn {
            width: 100%;
            padding: 14px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.3);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .alert {
            padding: 15px 20px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
            line-height: 1.5;
            animation: slideDown 0.3s ease-out;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .alert.success {
            background: #d4edda;
            border: 2px solid #c3e6cb;
            color: #155724;
            display: block !important;
        }

        .alert.error {
            background: #f8d7da;
            border: 2px solid #f5c6cb;
            color: #721c24;
            display: block !important;
        }

        .divider {
            text-align: center;
            margin: 25px 0;
            color: #999;
            position: relative;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: 40%;
            height: 1px;
            background: #e0e0e0;
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .links {
            text-align: center;
            margin-top: 20px;
        }

        .links a {
            color: #667eea;
            text-decoration: none;
            font-size: 14px;
            margin: 0 10px;
        }

        .links a:hover {
            text-decoration: underline;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .login-link p {
            color: #666;
            font-size: 14px;
        }

        .login-link a {
            color: #667eea;
            font-weight: 600;
            text-decoration: none;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .loader {
            display: none;
            text-align: center;
            margin: 20px 0;
        }

        .loader.active {
            display: block;
        }

        .spinner {
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .checkbox-group {
            display: flex;
            align-items: flex-start;
            margin-bottom: 20px;
        }

        .checkbox-group input[type="checkbox"] {
            width: auto;
            margin-right: 8px;
            margin-top: 3px;
        }

        .checkbox-group label {
            margin: 0;
            font-weight: 400;
            font-size: 13px;
            line-height: 1.4;
        }

        .checkbox-group label a {
            color: #667eea;
            text-decoration: none;
        }

        .checkbox-group label a:hover {
            text-decoration: underline;
        }

        .token-display {
            margin-top: 15px;
            padding: 10px;
            background: rgba(0,0,0,0.05);
            border-radius: 5px;
            word-break: break-all;
            font-size: 11px;
            font-family: 'Courier New', monospace;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="logo">
            <h1>📝 Registro</h1>
            <p>Proyecto ACD - Gestión de Equipos</p>
        </div>

        <div id="alert" class="alert"></div>

        <form id="registerForm" onsubmit="handleRegister(event); return false;">
            <div class="form-group">
                <label for="email">📧 Email</label>
                <input
                    type="email"
                    id="email"
                    placeholder="tu@email.com"
                    required
                    autocomplete="email"
                >
                <div class="help-text">Usaremos este email para tu cuenta</div>
            </div>

            <div class="form-group">
                <label for="password">🔒 Contraseña</label>
                <input
                    type="password"
                    id="password"
                    placeholder="Mínimo 6 caracteres"
                    required
                    minlength="6"
                    autocomplete="new-password"
                    oninput="checkPasswordStrength()"
                >
                <div class="strength-bar">
                    <div class="strength-fill" id="strengthFill"></div>
                </div>
                <div class="password-strength" id="strengthText"></div>
            </div>

            <div class="form-group">
                <label for="confirmPassword">🔒 Confirmar Contraseña</label>
                <input
                    type="password"
                    id="confirmPassword"
                    placeholder="Repite tu contraseña"
                    required
                    minlength="6"
                    autocomplete="new-password"
                    oninput="checkPasswordMatch()"
                >
                <div class="help-text" id="matchText"></div>
            </div>

            <div class="checkbox-group">
                <input type="checkbox" id="terms" required>
                <label for="terms">
                    Acepto los <a href="#" onclick="alert('Términos en desarrollo'); return false;">términos y condiciones</a>
                    y la <a href="#" onclick="alert('Política en desarrollo'); return false;">política de privacidad</a>
                </label>
            </div>

            <button type="submit" class="btn">Crear Cuenta</button>
        </form>

        <div class="loader" id="loader">
            <div class="spinner"></div>
            <p>Creando tu cuenta...</p>
        </div>

        <div class="divider">o</div>

        <div class="links">
            <a href="/">🏠 Inicio</a>
            <a href="/h2-console" target="_blank">🗄️ Base de Datos</a>
            <a href="/actuator/health" target="_blank">💚 Health</a>
        </div>

        <div class="login-link">
            <p>¿Ya tienes cuenta? <a href="/login">Inicia sesión aquí</a></p>
        </div>
    </div>

    <script>
        function checkPasswordStrength() {
            const password = document.getElementById('password').value;
            const strengthFill = document.getElementById('strengthFill');
            const strengthText = document.getElementById('strengthText');

            if (password.length === 0) {
                strengthFill.className = 'strength-fill';
                strengthText.textContent = '';
                return;
            }

            let strength = 0;

            // Verificar longitud
            if (password.length >= 6) strength++;
            if (password.length >= 10) strength++;

            // Verificar mayúsculas
            if (/[A-Z]/.test(password)) strength++;

            // Verificar números
            if (/[0-9]/.test(password)) strength++;

            // Verificar caracteres especiales
            if (/[^A-Za-z0-9]/.test(password)) strength++;

            // Actualizar UI
            if (strength <= 2) {
                strengthFill.className = 'strength-fill strength-weak';
                strengthText.textContent = '⚠️ Contraseña débil';
                strengthText.style.color = '#dc3545';
            } else if (strength <= 4) {
                strengthFill.className = 'strength-fill strength-medium';
                strengthText.textContent = '⚡ Contraseña media';
                strengthText.style.color = '#ffc107';
            } else {
                strengthFill.className = 'strength-fill strength-strong';
                strengthText.textContent = '✅ Contraseña fuerte';
                strengthText.style.color = '#28a745';
            }

            checkPasswordMatch();
        }

        function checkPasswordMatch() {
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const matchText = document.getElementById('matchText');
            const confirmInput = document.getElementById('confirmPassword');

            if (confirmPassword.length === 0) {
                matchText.textContent = '';
                confirmInput.classList.remove('error');
                return;
            }

            if (password === confirmPassword) {
                matchText.textContent = '✅ Las contraseñas coinciden';
                matchText.style.color = '#28a745';
                confirmInput.classList.remove('error');
            } else {
                matchText.textContent = '❌ Las contraseñas no coinciden';
                matchText.style.color = '#dc3545';
                confirmInput.classList.add('error');
            }
        }

        async function handleRegister(event) {
            event.preventDefault();

            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const terms = document.getElementById('terms').checked;
            const loader = document.getElementById('loader');
            const alert = document.getElementById('alert');
            const form = document.getElementById('registerForm');

            // Validar que las contraseñas coincidan
            if (password !== confirmPassword) {
                alert.className = 'alert error';
                alert.style.display = 'block';
                alert.innerHTML = '<strong>❌ Error</strong><br>Las contraseñas no coinciden';
                alert.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                return;
            }

            // Validar términos
            if (!terms) {
                alert.className = 'alert error';
                alert.style.display = 'block';
                alert.innerHTML = '<strong>❌ Error</strong><br>Debes aceptar los términos y condiciones';
                alert.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                return;
            }

            // Mostrar loader
            loader.classList.add('active');
            alert.style.display = 'none';

            try {
                const response = await fetch('/api/auth/register', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const data = await response.json();

                loader.classList.remove('active');

                if (response.ok) {
                    // Guardar token con el nombre correcto
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('userEmail', data.email);
                    localStorage.setItem('userRole', data.role);

                    // Mostrar éxito
                    alert.className = 'alert success';
                    alert.innerHTML = `
                        <strong>✅ ¡Cuenta creada exitosamente!</strong><br>
                        Email: ${data.email}<br>
                        Rol: ${data.role}<br>
                        Ya puedes iniciar sesión
                    `;

                    // Limpiar formulario
                    form.reset();
                    document.getElementById('strengthFill').className = 'strength-fill';
                    document.getElementById('strengthText').textContent = '';
                    document.getElementById('matchText').textContent = '';

                    // Redirigir después de 2 segundos
                    setTimeout(() => {
                        alert.innerHTML += '<br><em>Redirigiendo al inicio...</em>';
                        window.location.href = '/index.html';
                    }, 2000);
                } else {
                    // Error en el registro
                    const data = await response.json().catch(() => ({}));

                    loader.classList.remove('active');
                    alert.className = 'alert error';
                    alert.style.display = 'block';

                    if (response.status === 400 && data.message && data.message.includes('ya registrado')) {
                        alert.innerHTML = `
                            <strong>❌ Email ya registrado</strong><br>
                            Este correo ya está en uso. Intenta con otro o <a href="/login.html">inicia sesión</a>.
                        `;
                    } else {
                        alert.innerHTML = `
                            <strong>❌ Error en el registro</strong><br>
                            ${data.message || 'No se pudo crear la cuenta. Inténtalo de nuevo.'}
                        `;
                    }

                    // Hacer scroll al mensaje de error
                    alert.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
                }
            } catch (error) {
                loader.classList.remove('active');
                alert.className = 'alert error';
                alert.style.display = 'block';

                // Manejo específico de errores
                if (error.message.includes('Failed to fetch') || error.message.includes('NetworkError')) {
                    alert.innerHTML = `
                        <strong>❌ Error de conexión</strong><br>
                        No se pudo conectar con el servidor. Verifica tu conexión a internet.
                    `;
                } else if (error.message.includes('ya registrado')) {
                    alert.innerHTML = `
                        <strong>❌ Email ya registrado</strong><br>
                        Este correo ya está en uso. Intenta con otro o <a href="/login.html">inicia sesión</a>.
                    `;
                } else {
                    alert.innerHTML = `
                        <strong>❌ Error en el registro</strong><br>
                        ${error.message}
                    `;
                }

                // Hacer scroll al mensaje de error
                alert.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }
        }
    </script>
</body>
</html>
