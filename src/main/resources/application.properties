spring.application.name=proyecto-ACD
# Server Configuration
server.port=8081
# JWT Configuration
# Valor real definido en .env (variable JWT_SECRET)
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
# Database Configuration (Neon - PostgreSQL)
# Los valores reales se cargan desde el archivo .env en la raiz del proyecto
spring.datasource.url=${DB_URL}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
# JPA/Hibernate
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
# update para desarrollo; cambiar a validate en produccion
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
# API-Football Configuration
# Valor real definido en .env (variable API_FOOTBALL_KEY)
api.football.key=${API_FOOTBALL_KEY}
api.football.base-url=https://v3.football.api-sports.io
# Security
spring.security.user.name=admin
spring.security.user.password=admin
# Logging
logging.level.org.springframework.security=DEBUG
logging.level.com.futbol.proyectoacd.service.ApiFootballService=INFO
